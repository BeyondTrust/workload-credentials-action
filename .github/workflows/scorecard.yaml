# OpenSSF Scorecard — supply-chain security posture analysis. Results are
# uploaded to the Security tab and published to the public Scorecard API so the
# repository can display a Scorecard badge. Publishing to the Scorecard API
# only works once the repository is public.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 09:00 UTC
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write # upload SARIF results to the Security tab
      id-token: write # publish results to the OpenSSF Scorecard API
      contents: read
      actions: read # upload-sarif reads the workflow run for metadata
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          sarif_file: results.sarif
