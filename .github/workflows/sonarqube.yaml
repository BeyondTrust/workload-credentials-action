name: SonarQube Scan

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: none

jobs:
  set-project-version:
    if: ${{ github.actor != 'dependabot[bot]' }}
    name: Set Project Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      SONAR_PROJECT_VERSION: ${{ steps.set_version.outputs.SONAR_PROJECT_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set project version
        id: set_version
        run: |
          VERSION="$(jq -r '."."' .release-please-manifest.json)"
          echo "SONAR_PROJECT_VERSION=$VERSION" >> "$GITHUB_OUTPUT"

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set Node.js 20.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20.x
          registry-url: https://artifactory.dev.beyondtrust.com/artifactory/api/npm/npm/

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.JFROG_READONLY_PLAIN_ACCESS_TOKEN }}

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: coverage/

  sonarqube:
    name: Sonarqube Analysis
    needs: [set-project-version, test]
    permissions:
      contents: read
    uses: BeyondTrust/workflows/.github/workflows/sonarqube.yaml@94e83e3a94caaededfa1d5ee73077c334d0b1399 # v4.13.2
    secrets:
      SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
    with:
      coverage_artifact: coverage-reports
      coverage_artifact_path: coverage
      required_coverage_files: coverage/lcov.info
      extra_flags: >
        -Dsonar.projectVersion=${{ needs.set-project-version.outputs.SONAR_PROJECT_VERSION }}
        -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
        -Dsonar.qualitygate.wait=true
