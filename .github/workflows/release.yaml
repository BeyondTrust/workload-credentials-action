# Release pipeline. release-please keeps a release PR up to date on every push
# to main. That PR is metadata-only — CHANGELOG, package.json/package-lock.json
# version, and the release-please manifest — and never touches dist/: the
# bundle does not embed a version (the runtime logs GITHUB_ACTION_REF instead),
# so the dist/ committed by contributors on regular PRs (enforced by the
# required Check dist check) is already the released bundle.
#
# When the release PR is merged, release-please creates the tag + DRAFT
# release at the merge commit; the security gate evaluates the GHAS
# remediation-SLA policy, the bundle is provenance-attested, an SBOM is
# attached, the floating v{major} / v{major}.{minor} tags are moved, and the
# release is published. Everything runs as dependent jobs in a SINGLE workflow
# run on the default GITHUB_TOKEN — no PAT or GitHub App token.
#
# Known limitation: PRs created with the default GITHUB_TOKEN do not trigger
# other workflows, so the release PR's required checks will not start on their
# own. Before merging, dispatch each required workflow against the release
# branch (or close/reopen the PR to trigger everything at once):
#   gh workflow run test.yaml       --ref release-please--branches--main
#   gh workflow run check-dist.yaml --ref release-please--branches--main
#   gh workflow run security.yaml   --ref release-please--branches--main
name: Release

on:
  push:
    branches:
      - main

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created || false }}
      release_id: ${{ steps.release.outputs.id }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  security-gate:
    name: Security Gate
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: read # read Code Scanning alerts to evaluate the SLA policy
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Security gate
        uses: ./.github/actions/security-gate

  attest:
    name: Attest dist
    needs: [release-please, security-gate]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - name: Checkout release commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Attest dist/index.js
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/index.js

      - name: Upload attestation bundle to draft release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RELEASE_ID: ${{ needs.release-please.outputs.release_id }}
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        with:
          script: |
            const fs = require('fs');
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              release_id: parseInt(process.env.RELEASE_ID),
              name: 'attestation.sigstore.json',
              data: fs.readFileSync(process.env.BUNDLE_PATH),
            });

  # GitHub's Dependency Graph REST API returns an SPDX SBOM directly. Note:
  # this is a dependency-graph SBOM (the resolved npm dependencies), not a
  # per-artifact bill of materials of the bundled dist/index.js. It is
  # best-effort and never blocks publish (see the publish-release job's `if`).
  sbom:
    name: Generate SBOM
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # read the dependency graph and attach the SBOM to the release
    steps:
      - name: Generate SBOM
        id: sbom
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          file="workload-credentials-action_${TAG_NAME#v}_sbom.spdx.json"
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/dependency-graph/sbom" \
            --jq '.sbom' > "$file"
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Attach SBOM to draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          SBOM_FILE: ${{ steps.sbom.outputs.file }}
        run: gh release upload --repo "$GITHUB_REPOSITORY" --clobber "$TAG_NAME" "$SBOM_FILE"

  tag-major-minor:
    name: Move major and minor tags
    # Gated on security-gate: consumers track @v{major}, so moving the floating
    # tags is the de facto release and must not happen when the gate fails.
    needs: [release-please, security-gate]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Move v{major} and v{major}.{minor} tags to the released commit
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RELEASE_SHA: ${{ needs.release-please.outputs.sha }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          MAJOR_TAG: v${{ needs.release-please.outputs.major }}
          MINOR_TAG: v${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}
        with:
          script: |
            const sha      = process.env.RELEASE_SHA;
            const tagName  = process.env.TAG_NAME;
            const majorTag = process.env.MAJOR_TAG;
            const minorTag = process.env.MINOR_TAG;

            // Move a floating tag to `sha`. If the ref does not exist yet
            // (first release on this major/minor line), create it instead.
            // We do not need an annotated tag object here - lightweight tags
            // are sufficient for consumer pinning (`uses: org/action@v1`)
            // and they are what google-github-actions and most marketplace
            // actions publish for their floating refs. The semver tag
            // (e.g. v1.2.3) created by release-please remains annotated.
            async function upsertTag(refName) {
              try {
                await github.rest.git.updateRef({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  ref:   `tags/${refName}`,
                  sha:   sha,
                  force: true,
                });
                core.info(`Moved tag ${refName} -> ${sha} (${tagName})`);
                return;
              } catch (err) {
                core.info(
                  `updateRef failed for ${refName} (${err.message}); ` +
                  `attempting createRef`
                );
              }

              // Fall-through path: ref did not exist, create it.
              // If THIS call also fails the error propagates and fails the job.
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                ref:   `refs/tags/${refName}`,
                sha:   sha,
              });
              core.info(`Created tag ${refName} at ${sha} (${tagName})`);
            }

            await upsertTag(majorTag);
            await upsertTag(minorTag);

  publish-release:
    name: Publish release
    needs: [release-please, security-gate, attest, tag-major-minor, sbom]
    # always() prevents upstream "skipped" status from auto-skipping this job;
    # the explicit result checks ensure we only publish when the gate, the
    # attestation, and the tag moves all succeeded. The SBOM is best-effort:
    # it is in `needs` only for ordering and does not block publish.
    if: >-
      ${{ always() &&
          needs.release-please.outputs.release_created == 'true' &&
          needs.security-gate.result == 'success' &&
          needs.attest.result == 'success' &&
          needs.tag-major-minor.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RELEASE_ID: ${{ needs.release-please.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              release_id: parseInt(process.env.RELEASE_ID),
              draft: false,
            });
