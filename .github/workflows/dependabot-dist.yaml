# Dependabot bumps package.json/package-lock.json but never rebuilds dist/, so
# any update that changes the bundle output (runtime dependencies, or
# build-chain devDependencies like esbuild) fails the required Check dist. This
# workflow rebuilds dist/ on Dependabot PRs and commits the result back to the
# PR branch.
#
# main's ruleset requires signed commits, and that rule blocks merging a PR
# that contains any unsigned commit (squash-merge does not exempt it). So the
# rebuild commit is created through the GraphQL createCommitOnBranch mutation,
# which GitHub signs with its web-flow key (the commit shows as "Verified") with
# no signing key to manage. That API carries file contents base64-encoded in
# the request, capped at ~1MB; dist/ is a single ~638KB (base64) index.js, well
# under the limit, because build.ts emits no external sourcemap. If the bundle
# ever grows past the limit (e.g. a sourcemap is reintroduced), this workflow
# can no longer carry it through the signing API and must switch to another
# signed-commit mechanism.
#
# Commits made with GITHUB_TOKEN do not re-trigger pull_request workflows, so
# the required checks (Test, Check dist) are dispatched explicitly against the
# PR branch — their check runs attach to the new head SHA and satisfy the
# required checks (the same nudge release PRs use).
name: Dependabot dist

on:
  pull_request:
    branches:
      - main
    # Only npm updates can change the bundle; github-actions ecosystem bumps
    # never touch these files.
    paths:
      - package.json
      - package-lock.json

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  rebuild-dist:
    name: Rebuild dist
    if: >-
      ${{ github.actor == 'dependabot[bot]' &&
          github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # commit the rebuilt dist/ to the PR branch
      actions: write # dispatch the required checks on the new head
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # No git remote is used: the build runs with no token on disk, and the
          # rebuilt dist/ is committed through the GraphQL API (GH_TOKEN in env)
          # below. Keeping credentials out of .git/config means nothing from the
          # freshly-bumped dependency tree (npm ci, the build) sees a token.
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.ref }}

      # Snapshot the committed bundle before any code from the bumped dependency
      # tree runs, so the commit step can detect a rebuild with a plain cmp and
      # never has to invoke git on a tree the build may have tampered with.
      - name: Snapshot current dist/index.js
        run: cp dist/index.js "$RUNNER_TEMP/index.js.pre"

      - name: Set Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild the dist/ directory
        run: npm run build

      - name: Commit rebuilt dist/ to the PR branch
        id: commit
        run: |
          # dist/ is a single index.js by design (no sourcemap), so a plain cmp
          # against the pre-build snapshot tells us whether the bundle changed —
          # no git invocation on the post-build tree.
          if cmp -s dist/index.js "$RUNNER_TEMP/index.js.pre"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "dist/ is up to date; nothing to commit."
            exit 0
          fi

          # base64 to a file (no trailing newline with -w0) and feed it to jq via
          # --rawfile: the ~638KB string is too large to pass as a command-line
          # argument (ARG_MAX). || exit aborts rather than committing empty.
          base64 -w0 dist/index.js > "$RUNNER_TEMP/index.js.b64" || exit 1

          # expectedHeadOid pins the commit to the head the event fired on, so
          # the mutation fails (instead of clobbering) if the branch moved since
          # checkout (e.g. a Dependabot force-push) — a non-fast-forward guard
          # enforced server-side.
          body=$(
            jq -n \
              --arg repo "$GITHUB_REPOSITORY" \
              --arg branch "$HEAD_REF" \
              --arg oid "$HEAD_SHA" \
              --rawfile contents "$RUNNER_TEMP/index.js.b64" \
              '{
                query: "mutation ($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid } } }",
                variables: {
                  input: {
                    branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                    message: { headline: "build(deps): rebuild dist/" },
                    expectedHeadOid: $oid,
                    fileChanges: { additions: [ { path: "dist/index.js", contents: $contents } ] }
                  }
                }
              }'
          )

          # A transport/auth failure exits non-zero with an empty body; a GraphQL
          # error (e.g. an oid mismatch) comes back in a 200 body. Catch both so a
          # failed commit is never reported as a successful rebuild.
          if ! response=$(printf '%s' "$body" | gh api graphql --input -); then
            echo "createCommitOnBranch request failed:" >&2
            printf '%s\n' "$response" >&2
            exit 1
          fi
          if printf '%s' "$response" | jq -e '.errors' >/dev/null; then
            echo "createCommitOnBranch returned errors:" >&2
            printf '%s' "$response" | jq '.errors' >&2
            exit 1
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Dispatch required checks on the new head
        if: ${{ steps.commit.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          gh workflow run test.yaml --repo "$GITHUB_REPOSITORY" --ref "$HEAD_REF"
          gh workflow run check-dist.yaml --repo "$GITHUB_REPOSITORY" --ref "$HEAD_REF"
