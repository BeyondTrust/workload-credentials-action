# `dist/index.js` is a special file in Actions.
# When you reference an action with `uses:` in a workflow,
# `index.js` is the code that will run.
# For our project, we generate this file through a build process from other source files.
# We need to make sure the checked-in `index.js` actually matches what we expect it to be.
#
# Contributors build dist/ locally (`npm run all`) and commit it with their
# changes; this check rebuilds the bundle and fails when the committed dist/
# is stale. It runs on every PR and on every push to main, so anything pending
# (e.g. a stale bundle merged on a Dependabot PR) surfaces immediately.
#
# The release-please release PR is metadata-only (CHANGELOG, version fields,
# manifest) and never changes the bundle, so the dist/ committed by
# contributors is already the released bundle. Bot-created PRs cannot trigger
# this workflow on their own; use workflow_dispatch against the release branch
# (or close/reopen the PR) to report the required check there.
name: Check dist/

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-dist:
    name: Check dist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild the dist/ directory
        run: npm run build

      - name: Compare the expected and actual dist/ directories
        id: diff
        run: |
          if [ "$(git diff --ignore-space-at-eol dist/ | wc -l)" -gt "0" ]; then
            echo "Detected uncommitted changes after build.  See status below:"
            git diff --ignore-space-at-eol dist/
            echo ""
            echo "Run 'npm run all' locally and commit the dist/ changes."
            exit 1
          fi
