# Day-to-day lint runs in test.yaml via `npm run all` (prettier + eslint).
# MegaLinter only needs to run when the linter setup itself changes (e.g. a
# Dependabot bump of the MegaLinter action), and then it lints the full code
# base so we do not accumulate unknown linter tech-debt.
name: Lint

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/lint.yaml
      - .mega-linter.yaml
      - eslint.config.mjs
  # post-merge coverage for the PRs the gate below skips (fork / Dependabot)
  push:
    branches:
      - main
    paths:
      - .github/workflows/lint.yaml
      - .mega-linter.yaml
      - eslint.config.mjs

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # MegaLinter posts PR comments, which needs a writable token. Fork and
    # Dependabot PRs only get a read-only token, so skip them here; the push
    # trigger above lints those changes once merged.
    if: >-
      github.event_name != 'pull_request' ||
      (github.actor != 'dependabot[bot]' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      # Git Checkout
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
      - name: Install Dependencies
        run: npm ci --ignore-scripts

      # MegaLinter
      - name: MegaLinter
        id: ml
        uses: oxsecurity/megalinter/flavors/javascript@0e3ce9b9c8c10effb9b269509cc47ca17cae31c7 # v9.5.0
        env:
          VALIDATE_ALL_CODEBASE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload MegaLinter artifacts
      - name: Archive production artifacts
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: MegaLinter reports
          path: |
            megalinter-reports
            mega-linter.log
