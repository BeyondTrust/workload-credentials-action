version: 2
registries:
  npm-private-jfrog:
    type: npm-registry
    url: https://beyondtrust.jfrog.io/artifactory/api/npm/npm
    username: ${{ secrets.JFROG_READONLY_PLAIN_ACCESS_TOKEN_USER }}
    password: ${{ secrets.JFROG_READONLY_PLAIN_ACCESS_TOKEN }}
  npm-private-arti:
    type: npm-registry
    url: https://artifactory.dev.beyondtrust.com/artifactory/api/npm/npm
    username: ${{ secrets.JFROG_READONLY_PLAIN_ACCESS_TOKEN_USER }}
    password: ${{ secrets.JFROG_READONLY_PLAIN_ACCESS_TOKEN }}
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-gh-actions:
        update-types:
          - minor
          - patch
      major-gh-actions:
        update-types:
          - major
  - package-ecosystem: npm
    directories:
      - "**/*"
    schedule:
      interval: weekly
    groups:
      minor-npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch
      minor-npm-production:
        dependency-type: production
        update-types:
          - minor
          - patch
      major-npm-development:
        dependency-type: development
        update-types:
          - major
      major-npm-production:
        dependency-type: production
        update-types:
          - major
    registries:
      - npm-private-jfrog
      - npm-private-arti
