# GHAS Policy as Code — remediation SLA policy.
# Reference: https://github.com/advanced-security/policy-as-code
#
# Consumed by the `security-gate` composite action, which fails a release when an
# open alert has been open longer than the SLA (in days) for its severity (zero
# tolerance once past SLA). Alerts still within their window do not block.
#
# The explicit `codescanning` section holds only `remediate`, so alerts are
# evaluated purely on age. Adding a `level` key (or moving this under `general`,
# which gets a default level injected from the CLI `--severity` argument) would
# make the gate block alerts at/above that level immediately, regardless of age.
#
# Only Code Scanning is enabled in the gate — Dependabot, secret-scanning and
# dependency/licensing are disabled there (they require a GitHub App/PAT to read).
#
# SLA (max age in days): critical 10 | high 15 | medium 20 | low 90
codescanning:
  remediate:
    critical: 10
    high: 15
    medium: 20
    low: 90
