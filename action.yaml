name: 'workload-credentials'
description: 'A typescript action to get secrets from BeyondTrust workload credentials'
author: BeyondTrust/volt
inputs:
  api-version:
    description: 'The BeyondTrust API version.'
    required: false
    default: '2026-02-16'
  site-id:
    description: 'The BeyondTrust site ID (UUID).'
    required: true
  static-secrets:
    description: 'YAML list of secrets to retrieve. Each entry: path, key (* for all), output-name (optional alias), export-to-env (optional, default false).'
    required: true
runs:
  using: 'node20'
  main: 'dist/index.js'
