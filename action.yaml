name: 'workload-credentials'
description: 'A typescript action to get secrets from BeyondTrust workload credentials'
author: BeyondTrust/volt
inputs:
  api-base-url:
    description: 'The BeyondTrust API base URL (temporary override for testing).'
    required: false
    default: 'https://api.beyondtrust.io'
  api-version:
    description: 'The BeyondTrust API version.'
    required: false
    default: '2026-02-16'
  site-id:
    description: 'The BeyondTrust site ID (UUID).'
    required: true
  static:
    description: 'Static secrets to retrieve. Each line: <path> <key> [| <alias>]. Use * as key to export all fields.'
    required: false
  dynamic:
    description: 'Dynamic secrets to retrieve. Each line: <path> <key> [| <alias>]. Use * as key to export all fields.'
    required: false
runs:
  using: 'node20'
  main: 'dist/index.js'
