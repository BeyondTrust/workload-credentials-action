name: 'Workload Credentials Action'
description: 'Securely retrieve secrets from BeyondTrust Workload Credentials in your GitHub Actions workflows via OIDC'
author: BeyondTrust Corporation
inputs:
  api-version:
    description: 'The BeyondTrust API version.'
    required: false
    default: '2026-04-28'
  site-id:
    description: 'The BeyondTrust site ID (UUID). Available on the confirmation page after successfully creating an OIDC issuer registration in BeyondTrust Pathfinder Platform.'
    required: true
  service-name:
    description: 'The service name specified when creating an OIDC issuer registration in BeyondTrust Pathfinder Platform.'
    required: true
  static-secrets:
    description: 'YAML list of secrets to retrieve. Each entry: path (required), key (optional, omit to export all fields), output-name (optional alias, or prefix if ending with *), export-to-env (optional, default false).'
    required: true
runs:
  using: 'node24'
  main: 'dist/index.js'
branding:
  icon: 'lock'
  color: 'orange'
